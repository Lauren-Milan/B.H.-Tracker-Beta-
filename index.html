<title></title>Becoming Her</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

  :root{
    --ink:#f3ece0;
    --paper:#3c2a1e;
    --card:#4d3826;
    --brass:#c9a675;
    --brass-dim:#a98a5f;
    --line:#5f4632;
    --muted:#c9b79e;
    --green:#3f5c3f;
    --green-deep:#2e4630;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:32px 20px 80px;
  }
  header{
    text-align:center;
    margin-bottom:28px;
    border-bottom:1px solid var(--line);
    padding-bottom:24px;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--brass);
    margin-bottom:10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:34px;
    margin:0 0 6px;
    letter-spacing:-0.01em;
    color:#ffffff;
  }
  .dateline{
    font-size:13px;
    color:var(--muted);
    font-style:italic;
    font-family:'Fraunces',serif;
  }
  .streak{
    margin-top:16px;
    display:inline-flex;
    align-items:baseline;
    gap:6px;
    font-family:'Fraunces',serif;
  }
  .streak-num{
    font-size:28px;
    color:var(--brass);
    font-weight:600;
  }
  .streak-label{
    font-size:12px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .section{
    margin-bottom:26px;
  }
  .section-title{
    font-family:'Fraunces',serif;
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--brass);
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .section-count{
    font-family:'Inter',sans-serif;
    letter-spacing:0;
    text-transform:none;
    font-size:12px;
    color:var(--muted);
  }
  .item{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:13px 14px;
    background:var(--card);
    border-radius:8px;
    margin-bottom:6px;
    cursor:pointer;
    transition:background 0.15s ease;
    border-left:2px solid transparent;
  }
  .item:active{ background:#5a4230; }
  .item.done{
    border-left:2px solid var(--brass);
  }
  .box{
    width:22px;
    height:22px;
    min-width:22px;
    border:1.5px solid var(--brass-dim);
    border-radius:50%;
    margin-top:1px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.15s ease;
  }
  .item.done .box{
    background:var(--brass);
    border-color:var(--brass);
  }
  .box svg{
    width:12px;
    height:12px;
    opacity:0;
    transition:opacity 0.15s ease;
  }
  .item.done .box svg{ opacity:1; }
  .item-text{
    flex:1;
  }
  .item-title{
    font-size:14.5px;
    font-weight:500;
    line-height:1.4;
    color:var(--ink);
  }
  .item.done .item-title{
    color:var(--muted);
    text-decoration:line-through;
    text-decoration-color:var(--brass-dim);
  }
  .item-time{
    font-size:11px;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    letter-spacing:0.02em;
    margin-top:2px;
    opacity:0.8;
  }
  .item-sub{
    font-size:11.5px;
    color:var(--muted);
    font-style:italic;
    margin-top:4px;
    line-height:1.4;
    opacity:0.9;
  }
  .prompt-question{
    font-size:14px;
    color:var(--ink);
    font-family:'Fraunces',serif;
    font-style:italic;
    margin-bottom:10px;
    line-height:1.5;
  }
  textarea{
    width:100%;
    min-height:70px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
    resize:vertical;
  }
  textarea::placeholder{ color:var(--muted); font-style:italic; opacity:0.7; }
  .mantra{
    text-align:center;
    font-family:'Fraunces',serif;
    font-style:italic;
    font-size:15px;
    color:var(--brass);
    padding:18px 12px;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    margin-bottom:26px;
    line-height:1.5;
  }
  .reset{
    display:block;
    margin:30px auto 0;
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    font-size:12px;
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .loading{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-style:italic;
    font-family:'Fraunces',serif;
  }
  .footer-credit{
    text-align:center;
    margin-top:18px;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--line);
    font-family:'Inter',sans-serif;
  }

  .celebration{
    position:fixed;
    inset:0;
    background:linear-gradient(160deg, var(--green), var(--green-deep));
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px;
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.5s ease;
  }
  .celebration.show{
    opacity:1;
    pointer-events:all;
  }
  .celebration-eyebrow{
    font-size:12px;
    letter-spacing:0.24em;
    text-transform:uppercase;
    color:#d7e8d2;
    margin-bottom:16px;
  }
  .celebration-message{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:28px;
    color:#ffffff;
    line-height:1.35;
    max-width:380px;
    margin-bottom:28px;
  }
  .celebration-dismiss{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.4);
    color:#ffffff;
    font-size:13px;
    letter-spacing:0.05em;
    padding:12px 28px;
    border-radius:30px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">setting the table…</div>
</div>
<div class="celebration" id="celebration">
  <div class="celebration-eyebrow">Day Complete</div>
  <div class="celebration-message" id="celebration-message">Loading…</div>
  <button class="celebration-dismiss" onclick="dismissCelebration()">Close</button>
</div>

  { id: 'smoothie', title: 'Smoothie + Stretch', time: '6:30 AM' },
  { id: 'run', title: 'Run + Mobility', time: '7:00 – 8:30 AM' },
  { id: 'mirror', title: 'Mirror Check + Say One Line Out Loud', time: '8:30 AM', sub: 'Look in your eyes for a slow count of ten.' },
  { id: 'shower', title: 'Shower', time: '8:45 AM' },
  { id: 'deepwork1', title: 'Deep Work: Outreach, Follow-Ups, Applications', time: '9:00 AM – 1:00 PM' },
  { id: 'lunch', title: 'Lunch + Vitamins', time: '1:00 PM' },
  { id: 'meetings', title: 'Calls / Meetings', time: '2:00 – 4:00 PM' },
  { id: 'pause', title: 'Practiced A Real Pause Before Answering Someone Today', time: 'Ongoing' },
];

let state = { checks: {}, notes: '', distraction: '', streak: 0, lastCompleteDate: null, celebrationShownFor: null };
const todayKey = () => new Date().toISOString().slice(0,10);
const storageKey = `tracker:${todayKey()}`;

function load() {
  try {
    const raw = localStorage.getItem(storageKey);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.checks = parsed.checks || {};
      state.notes = parsed.notes || '';
      state.distraction = parsed.distraction || '';
      state.celebrationShownFor = parsed.celebrationShownFor || null;
    }
  } catch(e) { state.checks = {}; }

  try {
    const raw = localStorage.getItem('tracker:streak');
    if (raw) {
      const parsed = JSON.parse(raw);
      state.streak = parsed.streak || 0;
      state.lastCompleteDate = parsed.lastCompleteDate || null;
    }
  } catch(e) { state.streak = 0; }

  render();
}

function saveToday() {
  try {
    localStorage.setItem(storageKey, JSON.stringify({ checks: state.checks, notes: state.notes, distraction: state.distraction, celebrationShownFor: state.celebrationShownFor }));
  } catch(e) { console.error('save failed', e); }
}

function saveStreak() {
  try {
    localStorage.setItem('tracker:streak', JSON.stringify({ streak: state.streak, lastCompleteDate: state.lastCompleteDate }));
  } catch(e) { console.error('streak save failed', e); }
}

function checkStreakUpdate() {
  const doneCount = ITEMS.filter(i => state.checks[i.id]).length;
  const allDone = doneCount === ITEMS.length;
  if (allDone && state.lastCompleteDate !== todayKey()) {
    state.streak += 1;
    state.lastCompleteDate = todayKey();
    saveStreak();
  }
  if (allDone && state.celebrationShownFor !== todayKey()) {
    state.celebrationShownFor = todayKey();
    saveToday();
    showCelebration();
  }
}

function showCelebration() {
  const overlay = document.getElementById('celebration');
  const msgEl = document.getElementById('celebration-message');
  const msg = COMPLETION_MESSAGES[Math.floor(Math.random() * COMPLETION_MESSAGES.length)];
  msgEl.textContent = msg;
  overlay.classList.add('show');
}

function dismissCelebration() {
  document.getElementById('celebration').classList.remove('show');
}

function toggle(id) {
  state.checks[id] = !state.checks[id];
  saveToday();
  render();
  checkStreakUpdate();
}

function onNotesInput(e) {
  state.notes = e.target.value;
  saveToday();
}

function onDistractionInput(e) {
  state.distraction = e.target.value;
  saveToday();
}

function resetToday() {
  if (!confirm('Clear today\'s checklist? This only resets today, streak stays.')) return;
  state.checks = {};
  state.notes = '';
  state.distraction = '';
  state.celebrationShownFor = null;
  saveToday();
  render();
}

function render() {
  const app = document.getElementById('app');
  const doneCount = ITEMS.filter(i => state.checks[i.id]).length;
  const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const mantra = (state.streak === MILESTONE_STREAK) ? MILESTONE_MANTRA : MANTRAS[new Date().getDate() % MANTRAS.length];

  app.innerHTML = `
    <header>
<div class="eyebrow">Daily Standard</div>
<h1>Becoming Her</h1>
      <div class="dateline">${dateStr}</div>
      <div class="streak">
        <span class="streak-num">${state.streak}</span>
        <span class="streak-label">day streak</span>
      </div>
    </header>

    <div class="mantra">"${mantra}"</div>

    <div class="section">
      <div class="section-title">
        <span>Non-negotiables</span>
        <span class="section-count">${doneCount} / ${ITEMS.length}</span>
      </div>
      ${ITEMS.map(item => `
        <div class="item ${state.checks[item.id] ? 'done' : ''}" onclick="toggle('${item.id}')">
          <div class="box">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="#3c2a1e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="item-text">
            <div class="item-title">${item.title}</div>
            <div class="item-time">${item.time}</div>
            ${item.sub ? `<div class="item-sub">${item.sub}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>

    <div class="section">
      <div class="prompt-question">Did anything try to pull me off course today? If so, did I let it?</div>
      <textarea id="distraction" placeholder="Write it out, no judgment.">${state.distraction}</textarea>
    </div>

    <div class="section">
      <div class="prompt-question">What made her proud today? What's something worth remembering about who she's becoming today?</div>
      <textarea id="notes" placeholder="Be specific.">${state.notes}</textarea>
    </div>

    <button class="reset" onclick="resetToday()">Reset Today's Checklist</button>
    <div class="footer-credit">© Lauren Milan</div>
  `;

  document.getElementById('notes').addEventListener('input', onNotesInput);
  document.getElementById('distraction').addEventListener('input', onDistractionInput);
}

load();
</script>
</body>
</html>
